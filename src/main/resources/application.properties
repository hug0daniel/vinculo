spring.application.name=vinculo

# Server
server.port=8080

# H2 Console (dev only)
spring.h2console.enabled=true
spring.h2console.path=/h2console

# JPA
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT - set via environment variables in production
# Or set JWT_SECRET and JWT_EXPIRATION environment variables
jwt.secret=${JWT_SECRET:vinculo-dev-secret-must-be-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}